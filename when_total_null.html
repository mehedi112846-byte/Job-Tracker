<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <!-- for daisy ui  -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- for tailwind css  -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- for design linkup  -->
     <link rel="stylesheet" href="design/styleIndex.css">

    <!-- for font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

     <!-- for icons  -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="font bg-[#F1F2F4] pt-[60px] pb-[133px]">

    <header>
        <section class="navigation_section_null w-[69.375%] mx-auto ">
            <h3 class="text-center text-xl sm:text-left text-[#002C5C] sm:text-2xl font-bold ">Job Application Tracker</h3>

            <div class="nav_card_container flex flex-col gap-[16px] text-center mt-[20px] sm:flex-row">

                <div class="nav_card w-[100%] flex justify-between sm:w-[32.372%] sm:flex-col text-left p-[20px] bg-white">
                    <h4 class="text-[14px] text-[#323B49] font-medium">Total</h4>
                    <h4 class="text-[20px] text-[#002C5C] font-bold">8</h4>
                </div>

                <div class="nav_card w-[100%] flex justify-between sm:w-[32.372%] sm:flex-col text-left p-[20px] bg-white">
                    <h4 class="text-[14px] text-[#323B49] font-medium">Interview</h4>
                    <h4 class="text-[20px] text-[#10B981] font-bold">0</h4>
                </div>

                <div class="nav_card w-[100%] flex justify-between sm:w-[32.372%] sm:flex-col text-left p-[20px] bg-white">
                    <h4 class="text-[14px] text-[#323B49] font-medium">Rejected</h4>
                    <h4 class="text-[20px] text-[#EF4444] font-bold">0</h4>
                </div>
                
            </div>
            <hr class="border-[0.5px] border-[#E6E7E9] my-[30px]">
        </section>
    </header>

    <main>
        <section class="main_section_null w-[69.375%] mx-auto">
            <div class="main_top_title flex justify-between mb-[24px]">
                <h4 class="text-[20px] text-[#002C5C] font-bold">Available Jobs</h4>
                <h4 class="text-[15px] text-[#64748B] font-medium">8 jobs</h4>
            </div>

            <div class="main_top_button_container_null flex gap-[8px]">
                <button class="btn ">All</button>
                <button class="btn ">Interview</button>
                <button class="btn ">Rejected</button>
            </div>

            <div class="null_image p-[20px] sm:p-0 w-[100%] h-[400px] bg-white rounded-[8px] mx-auto mt-[16px] flex flex-col justify-center items-center">
                <img src="jobs.png" alt="">
                <h4 class="text-[20px] text-[#002C5C] font-bold mt-[20px]">No jobs available</h4>
                <p class="text-[16px] text-[#64748B] mt-[4px] text-center sm:text-left">Check back soon for new job opportunities</p>
            </div>
        </section>
    </main>
</body>
</html>
